---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: builds.orkano.io
spec:
  group: orkano.io
  names:
    categories:
    - orkano
    kind: Build
    listKind: BuildList
    plural: builds
    singular: build
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.appName
      name: App
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.commit
      name: Commit
      type: string
    - jsonPath: .status.image
      name: Image
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BuildSpec is a record of one build attempt: source and strategy are
              snapshots taken from the App at trigger time, so the record stays honest
              after the App changes. Retrying means creating a new Build.
            properties:
              appName:
                description: |-
                  AppName references the App this build belongs to, so it carries the
                  App's own naming rules (DNS-1123 subdomain). The pattern is also
                  load-bearing for INV-02: the name flows into the BuildKit --output
                  CSV and the image repository path, where a comma or colon would
                  inject options (e.g. a second push target).
                maxLength: 253
                minLength: 1
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                type: string
              commit:
                description: |-
                  Git commits are 40 lowercase hex characters; uploaded source artifacts
                  use the 64-character hex payload of their sha256 digest.
                pattern: ^([0-9a-f]{40}|[0-9a-f]{64})$
                type: string
              source:
                properties:
                  git:
                    description: |-
                      GitSource describes an unauthenticated HTTPS Git repository. Generic Git is
                      manual-deploy-only: automatic push delivery remains a GitHub App capability.
                      The feature gate and public-address checks are enforced by every component
                      before it performs network I/O; the CRD schema rejects credentials, query
                      parameters, fragments, and non-HTTPS URLs at the API boundary.
                    properties:
                      ref:
                        description: |-
                          Ref is a branch, tag, or commit-like name. Unset means the repository's
                          advertised HEAD. It is resolved to an immutable commit before a Build is
                          created.
                        maxLength: 250
                        pattern: ^[A-Za-z0-9_./-]+$
                        type: string
                        x-kubernetes-validations:
                        - message: ref must not contain '..'
                          rule: '!self.contains(''..'')'
                      url:
                        maxLength: 2048
                        minLength: 9
                        pattern: ^https://[A-Za-z0-9.-]+(:443)?/[A-Za-z0-9._~!$&'()*+,;=:%/-]+$
                        type: string
                    required:
                    - url
                    type: object
                  github:
                    properties:
                      ref:
                        description: |-
                          Ref has no schema default: a baked-in "main" would break "master"
                          repos forever once persisted. Unset means the repo's default
                          branch, resolved by the operator at build time.
                        maxLength: 250
                        type: string
                      repo:
                        maxLength: 140
                        pattern: ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$
                        type: string
                    required:
                    - repo
                    type: object
                  subPath:
                    description: |-
                      SubPath scopes the build context to a directory of the checkout,
                      like volumeMount.subPath; the Dockerfile path resolves relative
                      to it. The pattern and the no-".." rule mirror volumeMount.subPath:
                      the value lands in the BuildKit git context URL, where "#" or ":"
                      would change which ref/directory is built and ".." would escape
                      the intended directory.
                    maxLength: 512
                    pattern: ^[A-Za-z0-9_./-]+$
                    type: string
                    x-kubernetes-validations:
                    - message: subPath must not contain '..'
                      rule: '!self.contains(''..'')'
                  upload:
                    description: |-
                      UploadSource identifies an immutable ZIP artifact stored in Orkano's
                      in-cluster OCI registry. FileName is display-only and never a filesystem
                      destination.
                    properties:
                      digest:
                        pattern: ^sha256:[0-9a-f]{64}$
                        type: string
                      fileName:
                        maxLength: 255
                        pattern: ^[A-Za-z0-9][A-Za-z0-9._-]{0,250}[.]zip$
                        type: string
                    required:
                    - digest
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of github, git, or upload must be set
                  rule: 'has(self.github) ? (!has(self.git) && !has(self.upload))
                    : (has(self.git) != has(self.upload))'
              strategy:
                properties:
                  dockerfile:
                    description: |-
                      DockerfileBuild is deliberately path-only in v1alpha1: buildArgs and
                      target were deferred by ADR-0012 after the BuildKit spike — each widens
                      the hostile-input surface without being needed for the core loop.
                    properties:
                      path:
                        description: |-
                          Path to the Dockerfile, relative to source.subPath when set; an omitted
                          path (or omitted dockerfile block) selects the default "Dockerfile". The
                          pattern and the no-".." rule mirror source.subPath and static.dir: the
                          value lands in BuildKit's --opt=filename argument, where ".." would point
                          the build outside the intended subdirectory of the (commit-pinned)
                          context. Lower-risk than its siblings — single argv, no shell, no context
                          escape — but closing the validation asymmetry is cheap.
                        maxLength: 512
                        pattern: ^[A-Za-z0-9_./-]+$
                        type: string
                        x-kubernetes-validations:
                        - message: path must not contain '..'
                          rule: '!self.contains(''..'')'
                    type: object
                  nixpacks:
                    description: |-
                      NixpacksBuild configures Dockerfile generation by Nixpacks before the
                      existing rootless BuildKit build. Nixpacks never receives a Docker socket.
                      An empty block uses Nixpacks' conventional repository configuration.
                    properties:
                      configPath:
                        description: |-
                          ConfigPath optionally selects a Nixpacks TOML file relative to
                          source.subPath.
                        maxLength: 512
                        pattern: ^[A-Za-z0-9_./-]+$
                        type: string
                        x-kubernetes-validations:
                        - message: configPath must not contain '..'
                          rule: '!self.contains(''..'')'
                    type: object
                  static:
                    properties:
                      dir:
                        description: |-
                          Dir is the directory of build output to serve, relative to the
                          source root. It is COPYed into a generated Dockerfile, so it carries
                          source.subPath's pattern + no-".." rule: a newline would inject a
                          Dockerfile instruction, and ".." would escape the build context.
                        maxLength: 512
                        minLength: 1
                        pattern: ^[A-Za-z0-9_./-]+$
                        type: string
                        x-kubernetes-validations:
                        - message: dir must not contain '..'
                          rule: '!self.contains(''..'')'
                    required:
                    - dir
                    type: object
                  strategy:
                    enum:
                    - Dockerfile
                    - Static
                    - Nixpacks
                    type: string
                required:
                - strategy
                type: object
                x-kubernetes-validations:
                - message: build members must match the chosen strategy
                  rule: 'self.strategy == ''Dockerfile'' ? (!has(self.static) && !has(self.nixpacks))
                    : (self.strategy == ''Static'' ? (has(self.static) && !has(self.dockerfile)
                    && !has(self.nixpacks)) : (has(self.nixpacks) && !has(self.dockerfile)
                    && !has(self.static)))'
              timeoutSeconds:
                default: 900
                format: int32
                maximum: 3600
                minimum: 60
                type: integer
            required:
            - appName
            - commit
            - source
            - strategy
            type: object
            x-kubernetes-validations:
            - message: build spec is immutable; retry by creating a new Build
              rule: self == oldSelf
          status:
            properties:
              completedAt:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              image:
                description: Image is the digest-pinned reference the build pushed.
                type: string
              jobRef:
                description: |-
                  JobRef points at the BuildKit Job (in the build namespace, hence
                  namespace+name); in Phase 1 its pod logs are the build log.
                properties:
                  name:
                    maxLength: 253
                    type: string
                  namespace:
                    maxLength: 253
                    type: string
                required:
                - name
                - namespace
                type: object
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                type: string
              startedAt:
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
