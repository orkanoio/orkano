---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: mongoes.orkano.io
spec:
  group: orkano.io
  names:
    categories:
    - orkano
    kind: Mongo
    listKind: MongoList
    plural: mongoes
    singular: mongo
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .spec.storageSize
      name: Storage
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Mongo is Orkano's MongoDB catalog resource. The operator owns its
          StatefulSet, headless Service, data PVC, and connection Secret.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MongoSpec is intentionally the same small shape as PostgresSpec: a name
              produces one persistent database, while engine-specific upgrades and tuning
              stay explicit instead of hiding behind a generic Database abstraction.
            properties:
              mongoExpress:
                description: |-
                  MongoExpress enables the optional, internal-only Mongo Express admin UI.
                  It is absent by default because upstream recommends the tool only for
                  private development use.
                properties:
                  enabled:
                    type: boolean
                required:
                - enabled
                type: object
              storageSize:
                anyOf:
                - type: integer
                - type: string
                default: 10Gi
                description: |-
                  StorageSize is the requested data PVC size. It may grow; the reconciler
                  rejects shrink requests because Kubernetes volume expansion is one-way.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              version:
                default: "8.0"
                description: |-
                  Version is the MongoDB major release series resolved to a digest-pinned
                  mongo image. Immutable: changing release series needs an explicit data
                  migration, so v1 uses delete-and-recreate rather than pretending it is safe.
                enum:
                - "8.0"
                type: string
                x-kubernetes-validations:
                - message: version is immutable; migrate data into a new Mongo resource
                    to change it
                  rule: self == oldSelf
            type: object
          status:
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              mongoExpressServiceName:
                description: |-
                  MongoExpressServiceName is the operator-owned ClusterIP Service behind the
                  authenticated dashboard proxy. Empty while Mongo Express is disabled.
                type: string
              observedGeneration:
                format: int64
                type: integer
              secretName:
                description: |-
                  SecretName is the connection Secret produced for this database. It carries
                  only the name, never any credential value.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
