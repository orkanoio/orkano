# Values for the Orkano chart (ADR-0019). This surface grows with the chart
# (node prep lands with its template sub-commit) — never add a value here
# before the template that consumes it exists. storageClassName is deliberately
# absent: both install paths pin PVCs to the cluster's default StorageClass
# (the `cluster.storageclass-default` preflight check requires one), and
# threading a class through the verbatim static manifests would break the
# byte-equality drift guard (ADR-0019 decision 1).

images:
  # Registry namespace of the first-party component images; the components
  # render <repository>/orkano-{operator,receiver,dashboard}:<tag>. A
  # chart-only knob (`orkano init` always deploys from ghcr.io/orkanoio) —
  # override it for a registry mirror; the default is pinned to the Go path's
  # imageRepo const by the golden-render guard.
  repository: ghcr.io/orkanoio
  # Image tag for the first-party components. Empty = the chart's appVersion,
  # the Orkano release this chart line ships with.
  tag: ""

acme:
  # Registration email for the orkano-platform ACME ClusterIssuer (expiry
  # notices from Let's Encrypt). Optional.
  email: ""
  # false = Let's Encrypt staging (the safe default while a fresh install's
  # DNS and ingress still settle — staging never burns production rate
  # limits); true = production certificates.
  production: false

receiver:
  # Public hostname for the webhook receiver's Ingress — Orkano's one
  # internet-facing component (INV-05). Empty = no Ingress: the receiver stays
  # ClusterIP-only and can be exposed later by upgrading with a host set.
  host: ""

# GitHub repositories (owner/name) the receiver accepts webhooks from.
# Empty = deny-all (fail closed).
repoAllowlist: []

# Security-sensitive capabilities that are disabled by default. Enabling one
# expands Orkano's source/build trust surface; use only after reviewing the
# warning shown by `helm install` and `orkano doctor`.
features:
  unsafe: []

ingress:
  # IngressClass for the receiver Ingress and the ACME HTTP-01 solver.
  # Domain-rendered app Ingresses follow the cluster default until the
  # ingress-adapter work threads this into the operator (M4.2).
  className: traefik

certManager:
  # Install the vendored cert-manager (config/cert-manager, digest-pinned).
  # Set false when the cluster already runs cert-manager — `orkano preflight`
  # detects its CRDs and says so; Orkano then only creates its own namespaced
  # internal-CA issuers against the existing installation.
  install: true

secretsVault:
  # Install the vendored, namespace-scoped External Secrets Operator
  # (ADR-0018, opt-in — the dashboard's Vault page needs it).
  install: false
