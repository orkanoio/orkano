# Receiver egress lockdown (M1.3, INV-04): the receiver is the only
# internet-facing Orkano component, so a compromise of it must yield nothing
# beyond ringing the doorbell. This policy selects only the receiver pods and
# leaves their egress with exactly two destinations — CoreDNS (to resolve the
# Postgres service) and the platform Postgres on 5432. Once a pod is selected by
# any egress policy it is deny-by-default for egress, so this single policy
# severs the receiver from the Kubernetes API server, the GitHub API, and every
# other in-cluster service. The operator shares orkano-system but is NOT selected
# here (it needs broad egress), so its traffic is untouched — orkano-system has
# no namespace-wide default-deny by design.
#
# Ingress is deliberately not constrained here: webhooks must reach the receiver.
# Its exposure (the only public surface) is created explicitly by M1.5's
# component deploy, which also owns the Deployment.
#
# Label contracts for M1.5's component deploy: the receiver Deployment MUST label
# its pods `app.kubernetes.io/name: orkano-receiver` (this policy keys on it; an
# unlabeled receiver pod gets no egress at all, fail closed), and the platform
# Postgres pods MUST carry `app.kubernetes.io/name: orkano-postgres` in
# orkano-system or this allow does not match and the receiver cannot enqueue.
# Enforcement is capability-probed live, never read from config (E2E, M1.6).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orkano-receiver-egress
  namespace: orkano-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orkano-receiver
  policyTypes: [Egress]
  egress:
    # CoreDNS only, not all of kube-system — k3s and kind both label it
    # k8s-app: kube-dns (the same selector the build egress allowlist uses).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # The platform Postgres, same namespace (a bare podSelector scopes to this
    # policy's own namespace, orkano-system).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: orkano-postgres
      ports:
        - port: 5432
          protocol: TCP
