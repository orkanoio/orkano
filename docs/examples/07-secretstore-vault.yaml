# The external-vault connect (ADR-0018): one namespaced SecretStore + one
# value-blind credentials Secret its auth points at — exactly what the
# dashboard's "connect a store" form writes, and exactly what
# `kubectl get secretstores -n orkano-apps` then shows (no wrapper CR).
# The kinds are ESO's own; they exist only when the install opted in via
# `orkano init --secrets-vault`. Vault is the documented stable flagship —
# every other provider swaps only the `provider` block and the credential
# Secret's keys (ADR-0018 decision 5). The token below is the ONLY secret
# value in the pair, and it lives in the Secret, never in a CR (INV-03);
# scope it to the slice of the vault Orkano should reach (threat-model
# accepted risk #10).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: team-vault
  namespace: orkano-apps
spec:
  provider:
    vault:
      server: https://vault.internal.example:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: team-vault-credentials
          key: token
---
apiVersion: v1
kind: Secret
metadata:
  name: team-vault-credentials
  namespace: orkano-apps
type: Opaque
stringData:
  token: replace-with-a-scoped-vault-token
