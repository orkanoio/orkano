# One synced vault key (ADR-0018): this ExternalSecret materializes the
# ordinary Kubernetes Secret "api-stripe" from the store in example 07, and an
# App references it by name exactly like a catalog Secret (INV-03 — names in
# CRs, never values). The dashboard's Vault page ("New sync") writes this
# shape; apps then reference the produced Secret through the env editor's
# Secret-reference rows. ESO keeps the target Secret in sync on the refresh
# interval. creationPolicy Owner is load-bearing: ESO creates and owns the
# target and refuses to write into a Secret it did not create, so a sync can
# never be aimed at a catalog connection Secret or another controller's
# Secret (ADR-0018 decision 4 — the dashboard additionally refuses reserved
# target names before this backstop is ever needed).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-stripe
  namespace: orkano-apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: team-vault
  target:
    name: api-stripe
    creationPolicy: Owner
  data:
    - secretKey: STRIPE_KEY
      remoteRef:
        # under the scoped prefix the docs/vault.md policy recipe grants
        key: orkano/api/stripe
