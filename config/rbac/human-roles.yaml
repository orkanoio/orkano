# Human roles, bindable to OIDC identities and consumed via the dashboard's
# Phase 2 impersonation (ADR-0013; bindings are created at install/Phase 2,
# not shipped here). Humans get no secrets verbs at all in v1 — secret writes
# flow through the dashboard SA's value-blind path, and values are never
# displayed.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orkano-admin
  namespace: orkano-apps
rules:
  - apiGroups: ["orkano.io"]
    resources: ["apps", "builds", "domains"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orkano-viewer
  namespace: orkano-apps
rules:
  - apiGroups: ["orkano.io"]
    resources: ["apps", "builds", "domains"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
