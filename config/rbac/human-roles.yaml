# Human roles, bindable to OIDC identities and consumed via the dashboard's
# impersonation (ADR-0013/ADR-0015). orkano-viewer is the dashboard's fixed
# impersonation target — bound to the orkano:viewers group in
# dashboard-impersonate.yaml — so it backs every read view; orkano-admin ships
# unbound for direct OIDC binding. Humans get no secrets verbs at all in v1 —
# secret writes flow through the dashboard SA's value-blind path, and values are
# never displayed.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orkano-admin
  namespace: orkano-apps
rules:
  - apiGroups: ["orkano.io"]
    resources: ["apps", "builds", "domains", "postgreses", "mongoes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orkano-viewer
  namespace: orkano-apps
rules:
  - apiGroups: ["orkano.io"]
    resources: ["apps", "builds", "domains", "postgreses", "mongoes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Vault status views (ADR-0018): ESO kinds hold configuration, never values.
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores", "externalsecrets"]
    verbs: ["get", "list", "watch"]
  # The dashboard doctor's TLS check lists cert-manager Certificates in
  # orkano-apps too (the per-Domain ACME leaves live here); status only.
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["list"]
---
# BuildKit logs live with the build Job pods, outside orkano-apps. Reuse the
# same fixed viewer group with a second namespace-local read-only Role; no Job
# mutation and no Secret access crosses this boundary.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orkano-viewer
  namespace: orkano-builds
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orkano-viewers
  namespace: orkano-builds
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: orkano-viewer
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: orkano:viewers
---
# The dashboard doctor face (a read-only run under the impersonated viewer)
# reads platform-component health in orkano-system. Every grant maps 1:1 to a
# doctor read: pinned get-by-name for the workloads and the dashboard Service,
# namespace-scoped list for the exposure and TLS checks. No secrets, no
# mutation — the value-blind viewer never gains `secrets get`.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orkano-viewer
  namespace: orkano-system
rules:
  # exposure.dashboard-not-public reads the dashboard Service by name.
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["orkano-dashboard"]
    verbs: ["get"]
  # platform.components-ready and features.unsafe-disabled read the control-plane
  # Deployments by name.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["orkano-operator", "orkano-receiver", "orkano-registry", "orkano-dashboard"]
    verbs: ["get"]
  # platform.components-ready reads the platform Postgres StatefulSet by name.
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    resourceNames: ["orkano-postgres"]
    verbs: ["get"]
  # exposure.dashboard-not-public lists Ingresses and Traefik IngressRoutes that
  # might route to the dashboard.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["list"]
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes", "ingressroutetcps"]
    verbs: ["list"]
  # tls.certificate-expiry lists cert-manager Certificates (the internal CA and
  # registry/receiver leaves live here).
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orkano-viewers
  namespace: orkano-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: orkano-viewer
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: orkano:viewers
---
# The dashboard's Settings page lists cluster nodes, and the dashboard doctor's
# etcd-backup check reads k3s's cluster-scoped snapshot records and the
# cluster's age from kube-system — cluster-scoped reads no namespaced Role can
# grant. Reuse the same fixed viewer group with a minimal ClusterRole: node
# inventory (get/list — no watch, the page polls), snapshot-record list, and a
# name-pinned get on the kube-system namespace. No secrets, no mutation.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: orkano-viewer
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["k3s.cattle.io"]
    resources: ["etcdsnapshotfiles"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["namespaces"]
    resourceNames: ["kube-system"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: orkano-viewers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: orkano-viewer
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: orkano:viewers
