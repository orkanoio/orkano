apiVersion: v1
kind: ServiceAccount
metadata:
  name: orkano-operator
  namespace: orkano-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orkano-dashboard
  namespace: orkano-system
---
# The receiver holds no Kubernetes permissions at all: no Role, no
# RoleBinding, no token mounted (INV-04). Its entire credential set is the
# webhook HMAC key and an INSERT-only Postgres role.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orkano-receiver
  namespace: orkano-system
automountServiceAccountToken: false
---
# Build pods run hostile code; they get no permissions and no token (INV-02).
# The M1.2 Job template repeats automountServiceAccountToken: false at the
# pod level — defense in depth, not redundancy.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orkano-build
  namespace: orkano-builds
automountServiceAccountToken: false
