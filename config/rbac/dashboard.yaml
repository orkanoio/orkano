# Dashboard ServiceAccount permissions — docs/security/rbac-matrix.md made
# literal (INV-01). The value-blind secrets rule is the most load-bearing
# line: create+update are the two mutation verbs whose response bodies return
# nothing beyond the caller's own payload (probed by
# TestSecretVerbValueBlindness), so a compromised dashboard can corrupt app
# secrets (visible, recoverable) but never exfiltrate them. patch is never
# granted: a PATCH response returns the stored object, values included
# (ADR-0013). No impersonation grant until Phase 2 ships its consumer pinned
# via resourceNames — unrestricted impersonate can name system:masters.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orkano-dashboard
  namespace: orkano-apps
rules:
  - apiGroups: ["orkano.io"]
    resources: ["apps", "domains"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["orkano.io"]
    resources: ["builds"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orkano-dashboard
  namespace: orkano-apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: orkano-dashboard
subjects:
  - kind: ServiceAccount
    name: orkano-dashboard
    namespace: orkano-system
