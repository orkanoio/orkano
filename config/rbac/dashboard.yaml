# Dashboard ServiceAccount permissions — docs/security/rbac-matrix.md made
# literal (INV-01). The write-only secrets rule is the most load-bearing line:
# create+patch with no read verbs means a compromised dashboard can corrupt
# app secrets (visible, recoverable) but never exfiltrate them.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orkano-dashboard
  namespace: orkano-apps
rules:
  - apiGroups: ["orkano.io"]
    resources: ["apps", "domains"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["orkano.io"]
    resources: ["builds"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orkano-dashboard
  namespace: orkano-apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: orkano-dashboard
subjects:
  - kind: ServiceAccount
    name: orkano-dashboard
    namespace: orkano-system
---
# Impersonation cannot be namespace-bound for users/groups, so this is the
# dashboard's only cluster-scoped grant. Compensating control: every identity
# the dashboard may impersonate is bound only to orkano-viewer, so
# impersonated reads can never exceed read-only access in orkano-apps.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: orkano-dashboard-impersonation
rules:
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: orkano-dashboard-impersonation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: orkano-dashboard-impersonation
subjects:
  - kind: ServiceAccount
    name: orkano-dashboard
    namespace: orkano-system
