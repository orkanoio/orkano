# Fixed-value credentials for the hermetic E2E — the install (internal/install/
# secrets.go) generates these with crypto/rand, but the E2E pins them so the
# run.sh signer and the DSNs are reproducible. Names and keys mirror
# secrets.go EXACTLY (orkano-postgres-superuser/operator-db/receiver-db/
# dashboard-db with password+dsn, orkano-webhook-secret with secret); the
# bootstrap-token Secret is omitted (the E2E does not redeem the install token).
#
# The passwords use the db.SetupRoles safe charset ([A-Za-z0-9._~-]) and the
# DSNs embed the same values. The migration Job (20-migration-job) ALTER ROLEs
# orkano_receiver/orkano_dispatcher/orkano_dashboard to these exact passwords, so
# the role DSNs the components connect with stay consistent.
apiVersion: v1
kind: Secret
metadata:
  name: orkano-postgres-superuser
  namespace: orkano-system
type: Opaque
stringData:
  password: e2esuperuser0000
  dsn: postgres://orkano:e2esuperuser0000@orkano-postgres.orkano-system.svc:5432/orkano?sslmode=disable
---
apiVersion: v1
kind: Secret
metadata:
  name: orkano-operator-db
  namespace: orkano-system
type: Opaque
stringData:
  # password is the dispatcher role's, read by the migration Job as
  # ORKANO_DISPATCHER_PASSWORD; dsn is the dispatcher's connection string.
  password: e2edispatcher000
  dsn: postgres://orkano_dispatcher:e2edispatcher000@orkano-postgres.orkano-system.svc:5432/orkano?sslmode=disable
---
apiVersion: v1
kind: Secret
metadata:
  name: orkano-receiver-db
  namespace: orkano-system
type: Opaque
stringData:
  password: e2ereceiver00000
  dsn: postgres://orkano_receiver:e2ereceiver00000@orkano-postgres.orkano-system.svc:5432/orkano?sslmode=disable
---
apiVersion: v1
kind: Secret
metadata:
  name: orkano-dashboard-db
  namespace: orkano-system
type: Opaque
stringData:
  # password is the dashboard role's, read by the migration Job as
  # ORKANO_DASHBOARD_PASSWORD; dsn is the dashboard's connection string.
  password: e2edashboard0000
  dsn: postgres://orkano_dashboard:e2edashboard0000@orkano-postgres.orkano-system.svc:5432/orkano?sslmode=disable
---
apiVersion: v1
kind: Secret
metadata:
  name: orkano-webhook-secret
  namespace: orkano-system
type: Opaque
stringData:
  # The HMAC key the receiver verifies X-Hub-Signature-256 against; run.sh signs
  # the test push with this exact value.
  secret: orkano-e2e-webhook-secret
