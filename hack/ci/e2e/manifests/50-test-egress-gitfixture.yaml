# ADDITIVE, test-only egress allow: build pods may reach the in-cluster git
# fixture. Production config/netpol/orkano-builds.yaml allows build egress only
# to DNS, the registry :5000, and 443-to-public-EXCEPT-RFC1918 — and the git
# fixture is an RFC1918 ClusterIP, so without this the build's clone is denied.
# NetworkPolicies are additive (a union of allows), so this opens exactly one
# extra destination and weakens nothing else; config/netpol/ stays byte-identical.
#
# The non-allowlisted-egress invariant probe (51-probe-canaries) therefore
# targets a DIFFERENT destination (the stub on :80, not allowed here) so it still
# proves the deny works. Port 8080 is the gitfixture POD port (NetworkPolicy
# matches post-DNAT, like the registry's :5000), behind the Service's :80.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: e2e-build-egress-gitfixture
  namespace: orkano-builds
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orkano-build
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: orkano-e2e
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gitfixture
      ports:
        - port: 8080
          protocol: TCP
