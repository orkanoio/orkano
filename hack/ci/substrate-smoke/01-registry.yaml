# Plaintext spike-style registry: acceptable for the substrate smoke only.
# The product registry speaks TLS from a cluster-internal CA (ADR-0012) and
# lands with M1.2's registry task; registry.insecure never ships.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: orkano-smoke-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:3.0.0
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: orkano-smoke-infra
spec:
  selector:
    app: registry
  ports:
    - port: 5000
      targetPort: 5000
