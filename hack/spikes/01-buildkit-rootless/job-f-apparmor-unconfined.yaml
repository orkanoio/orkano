# Attempt F1 — E plus AppArmor Unconfined (modern field, not the deprecated
# annotation). The cri-containerd default profile silently denies mount(2)
# (explicit `deny mount,` in containerd's template), which kills the
# rootlesskit child at "failed to share mount point: /".
# AppArmor Unconfined is NOT baseline-legal -> requires PSA privileged.
# Risk probed here: kernel.apparmor_restrict_unprivileged_userns=1 targets
# *unconfined* processes, so going unconfined may re-break userns creation.
apiVersion: batch/v1
kind: Job
metadata:
  name: buildkit-f1
  namespace: orkano-build-spike
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app: buildkit
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      containers:
        - name: buildkit
          image: moby/buildkit:v0.30.0-rootless
          command: ["buildctl-daemonless.sh"]
          args:
            - build
            - --frontend=dockerfile.v0
            - --local=context=/workspace
            - --local=dockerfile=/workspace
            - --output=type=image,name=registry.orkano-spike-infra.svc.cluster.local:5000/spike:f1,push=true,registry.insecure=true
          env:
            - name: BUILDKITD_FLAGS
              value: --oci-worker-no-process-sandbox
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: true
            capabilities:
              drop: [ALL]
              add: [SETUID, SETGID]
            appArmorProfile:
              type: Unconfined
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: buildkitd
              mountPath: /home/user/.local/share/buildkit
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          configMap:
            name: build-context
        - name: buildkitd
          emptyDir: {}
        - name: tmp
          emptyDir: {}
