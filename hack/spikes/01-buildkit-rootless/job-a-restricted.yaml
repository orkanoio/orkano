# Attempt A — fully restricted-PSA-compliant: RuntimeDefault seccomp, default
# apparmor, masked /proc. The central question: can RootlessKit create user
# namespaces under the default seccomp profile on this kernel/runc?
apiVersion: batch/v1
kind: Job
metadata:
  name: buildkit-a
  namespace: orkano-build-spike
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app: buildkit
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      containers:
        - name: buildkit
          image: moby/buildkit:v0.30.0-rootless
          command: ["buildctl-daemonless.sh"]
          args:
            - build
            - --frontend=dockerfile.v0
            - --local=context=/workspace
            - --local=dockerfile=/workspace
            - --output=type=image,name=registry.orkano-spike-infra.svc.cluster.local:5000/spike:a,push=true,registry.insecure=true
          env:
            - name: BUILDKITD_FLAGS
              value: --oci-worker-no-process-sandbox
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: buildkitd
              mountPath: /home/user/.local/share/buildkit
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          configMap:
            name: build-context
        - name: buildkitd
          emptyDir: {}
        - name: tmp
          emptyDir: {}
