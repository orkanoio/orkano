# Violates: EnvVar CEL — exactly one of value or secretRef.
apiVersion: orkano.io/v1alpha1
kind: App
metadata:
  name: invalid-env
  namespace: orkano-apps
spec:
  source:
    github:
      repo: alice/app
  build:
    strategy: Dockerfile
  env:
    - name: BOTH
      value: plaintext
      secretRef:
        name: some-secret
        key: k
